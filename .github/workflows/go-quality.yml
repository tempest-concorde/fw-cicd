name: Go Quality Gates (Reusable)

on:
  workflow_call:
    inputs:
      go_version_file:
        description: 'Path to file containing Go version (e.g., go.mod)'
        required: false
        type: string
        default: 'go.mod'
      golangci_lint_version:
        description: 'golangci-lint version'
        required: false
        type: string
        default: 'v2.2'
      run_govulncheck:
        description: 'Run govulncheck vulnerability scanner'
        required: false
        type: boolean
        default: true
      working_directory:
        description: 'Working directory for Go commands'
        required: false
        type: string
        default: '.'

jobs:
  quality:
    name: Go quality analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true

      - name: Format check (gofmt)
        working-directory: ${{ inputs.working_directory }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files need formatting with gofmt:"
            echo "$unformatted"
            exit 1
          fi
          echo "All Go files are properly formatted"

      - name: Go vet
        working-directory: ${{ inputs.working_directory }}
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a  # v9.3.0
        with:
          version: ${{ inputs.golangci_lint_version }}
          working-directory: ${{ inputs.working_directory }}
          args: --timeout=5m

      - name: Install govulncheck
        if: inputs.run_govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        if: inputs.run_govulncheck
        working-directory: ${{ inputs.working_directory }}
        run: govulncheck ./...
