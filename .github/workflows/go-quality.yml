name: Go Quality Gates (Reusable)

on:
  workflow_call:
    inputs:
      go_version_file:
        description: 'Path to file containing Go version (e.g., go.mod)'
        required: false
        type: string
        default: 'go.mod'
      golangci_lint_version:
        description: 'golangci-lint version'
        required: false
        type: string
        default: 'v2.2'
      run_govulncheck:
        description: 'Run govulncheck vulnerability scanner'
        required: false
        type: boolean
        default: true
      working_directory:
        description: 'Working directory for Go commands'
        required: false
        type: string
        default: '.'

jobs:
  quality:
    name: Go quality analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@8db4946e249682a64e076c8c972a48ab6c7dbfeb  # v5.2.0
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true

      - name: Format check (gofmt)
        working-directory: ${{ inputs.working_directory }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files need formatting with gofmt:"
            echo "$unformatted"
            exit 1
          fi
          echo "All Go files are properly formatted"

      - name: Go vet
        working-directory: ${{ inputs.working_directory }}
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@9f65f1e7c04df24fc2c2d0b6d51b8067e06e6ea2  # v7.2.0
        with:
          version: ${{ inputs.golangci_lint_version }}
          working-directory: ${{ inputs.working_directory }}
          args: --timeout=5m

      - name: Install govulncheck
        if: inputs.run_govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        if: inputs.run_govulncheck
        working-directory: ${{ inputs.working_directory }}
        run: govulncheck ./...
