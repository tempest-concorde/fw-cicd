name: Semantic Release (Reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version for semantic-release'
        required: false
        type: string
        default: '20'
      use_local_config:
        description: 'Use package.json instead of global install'
        required: false
        type: boolean
        default: false
    outputs:
      new_release_published:
        description: 'Whether a new release was published'
        value: ${{ jobs.release.outputs.new_release_published }}
      new_release_version:
        description: 'The new release version'
        value: ${{ jobs.release.outputs.new_release_version }}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: ${{ inputs.use_local_config }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288e6bc5e4010c1d11743126a1f9f0e3  # v4.2.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install semantic-release (global)
        if: inputs.use_local_config == false
        run: |
          npm install -g \
            semantic-release@24.2.0 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/git@10.0.1 \
            @semantic-release/github@11.0.1 \
            conventional-changelog-conventionalcommits@8.0.0

      - name: Install dependencies (local config)
        if: inputs.use_local_config == true
        run: npm ci

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          npx semantic-release --ci

      - name: Output release info
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "New release published: v${{ steps.semantic.outputs.new_release_version }}"
