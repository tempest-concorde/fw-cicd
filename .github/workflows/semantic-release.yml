name: Semantic Release (Reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version for semantic-release'
        required: false
        type: string
        default: '20'
      use_local_config:
        description: 'Use package.json instead of global install'
        required: false
        type: boolean
        default: false
    outputs:
      new_release_published:
        description: 'Whether a new release was published'
        value: ${{ jobs.release.outputs.new_release_published }}
      new_release_version:
        description: 'The new release version'
        value: ${{ jobs.release.outputs.new_release_version }}
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Generate release bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: ${{ inputs.use_local_config }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install semantic-release (global)
        if: inputs.use_local_config == false
        run: |
          npm install -g \
            semantic-release@24.2.0 \
            @semantic-release/changelog@6.0.3 \
            @semantic-release/git@10.0.1 \
            @semantic-release/github@11.0.1 \
            conventional-changelog-conventionalcommits@8.0.0

      - name: Install dependencies (local config)
        if: inputs.use_local_config == true
        run: npm ci

      - name: Get latest tag before release
        id: before
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "tag=$BEFORE" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          npx semantic-release --ci

      - name: Detect new release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git fetch --tags
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          BEFORE="${{ steps.before.outputs.tag }}"
          if [ "$AFTER" != "$BEFORE" ] && [ "$AFTER" != "none" ]; then
            VERSION="${AFTER#v}"
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            echo "New release published: $AFTER"
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "No new release"
          fi
