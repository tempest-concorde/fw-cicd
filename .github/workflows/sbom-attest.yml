name: SBOM Attestation (Reusable)

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io)'
        required: true
        type: string
      image_name:
        description: 'Image name without registry (e.g., tempest-concorde/fw-app)'
        required: true
        type: string
      image_digest:
        description: 'Image digest to attest'
        required: true
        type: string
      signing_mode:
        description: 'Signing mode: key (default) or keyless'
        required: false
        type: string
        default: 'key'
    secrets:
      GITHUB_TOKEN:
        required: true
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Log in to Container Registry
        run: |
          podman login ${{ inputs.registry }} \
            -u ${{ github.actor }} \
            -p "${{ secrets.GITHUB_TOKEN }}" \
            --compat-auth-file $HOME/.docker/config.json

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@06ec9fc82ffc1b9bba41fc6834a074eda8f5600b  # v0.18.2
        with:
          image: ${{ inputs.registry }}/${{ inputs.image_name }}@${{ inputs.image_digest }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Attest SBOM with cosign (key-based)
        if: inputs.signing_mode == 'key'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_REF="${{ inputs.registry }}/${{ inputs.image_name }}@${{ inputs.image_digest }}"
          cosign attest --yes \
            --key env://COSIGN_PRIVATE_KEY \
            --type cyclonedx \
            --predicate sbom.cyclonedx.json \
            "${IMAGE_REF}"
          echo "✅ SBOM attested (key-based) to: ${IMAGE_REF}"

      - name: Attest SBOM with cosign (keyless)
        if: inputs.signing_mode == 'keyless'
        run: |
          IMAGE_REF="${{ inputs.registry }}/${{ inputs.image_name }}@${{ inputs.image_digest }}"
          cosign attest --yes \
            --type cyclonedx \
            --predicate sbom.cyclonedx.json \
            "${IMAGE_REF}"
          echo "✅ SBOM attested (keyless) to: ${IMAGE_REF}"
