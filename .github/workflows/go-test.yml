name: Go Test (Reusable)

on:
  workflow_call:
    inputs:
      go_version_file:
        description: 'Path to file containing Go version (e.g., go.mod)'
        required: false
        type: string
        default: 'go.mod'
      working_directory:
        description: 'Working directory for Go commands'
        required: false
        type: string
        default: '.'
      test_args:
        description: 'Additional arguments for go test (e.g., -race -count=1)'
        required: false
        type: string
        default: '-race -count=1'
      upload_coverage:
        description: 'Upload coverage report to Codecov'
        required: false
        type: boolean
        default: true
      codecov_flags:
        description: 'Codecov flag name for coverage upload'
        required: false
        type: string
        default: 'unittests'

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: go test ${{ inputs.test_args }} -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: inputs.upload_coverage
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac  # v5.5.5
        with:
          files: ${{ inputs.working_directory }}/coverage.out
          flags: ${{ inputs.codecov_flags }}
