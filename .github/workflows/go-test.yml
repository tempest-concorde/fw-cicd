name: Go Test (Reusable)

on:
  workflow_call:
    inputs:
      go_version_file:
        description: 'Path to file containing Go version (e.g., go.mod)'
        required: false
        type: string
        default: 'go.mod'
      working_directory:
        description: 'Working directory for Go commands'
        required: false
        type: string
        default: '.'
      test_args:
        description: 'Additional arguments for go test (e.g., -race -count=1)'
        required: false
        type: string
        default: '-race -count=1'
      upload_coverage:
        description: 'Upload coverage report to Codecov'
        required: false
        type: boolean
        default: true
      codecov_flags:
        description: 'Codecov flag name for coverage upload'
        required: false
        type: string
        default: 'unittests'

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: go test ${{ inputs.test_args }} -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: inputs.upload_coverage
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.3.1
        with:
          files: ${{ inputs.working_directory }}/coverage.out
          flags: ${{ inputs.codecov_flags }}
