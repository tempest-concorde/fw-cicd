name: Go Test (Reusable)

on:
  workflow_call:
    inputs:
      go_version_file:
        description: 'Path to file containing Go version (e.g., go.mod)'
        required: false
        type: string
        default: 'go.mod'
      working_directory:
        description: 'Working directory for Go commands'
        required: false
        type: string
        default: '.'
      test_args:
        description: 'Additional arguments for go test (e.g., -race -count=1)'
        required: false
        type: string
        default: '-race -count=1'
      upload_coverage:
        description: 'Upload coverage report to Codecov'
        required: false
        type: boolean
        default: true
      codecov_flags:
        description: 'Codecov flag name for coverage upload'
        required: false
        type: string
        default: 'unittests'

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version-file: ${{ inputs.working_directory }}/${{ inputs.go_version_file }}
          cache: true

      - name: Run tests
        working-directory: ${{ inputs.working_directory }}
        run: go test ${{ inputs.test_args }} -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: inputs.upload_coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ${{ inputs.working_directory }}/coverage.out
          flags: ${{ inputs.codecov_flags }}
