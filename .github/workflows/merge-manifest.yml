name: Merge Multi-Arch Manifest (Reusable)

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io)'
        required: true
        type: string
      image_name:
        description: 'Image name without registry (e.g., tempest-concorde/fw-app)'
        required: true
        type: string
      tag:
        description: 'Tag for the multi-arch manifest (e.g., v1.0.0, latest)'
        required: true
        type: string
      amd64_digest:
        description: 'AMD64 image digest (optional, if built)'
        required: false
        type: string
        default: ''
      arm64_digest:
        description: 'ARM64 image digest (required for RPI4)'
        required: true
        type: string
      signing_mode:
        description: 'Signing mode: key (default) or keyless'
        required: false
        type: string
        default: 'key'
    outputs:
      digest:
        description: 'Manifest list digest'
        value: ${{ jobs.merge.outputs.digest }}
    secrets:
      GITHUB_TOKEN:
        required: true
      COSIGN_PRIVATE_KEY:
        required: false
      COSIGN_PASSWORD:
        required: false

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # For cosign keyless signing

    outputs:
      digest: ${{ steps.create-manifest.outputs.digest }}

    steps:
      - name: Log in to Container Registry
        run: |
          podman login ${{ inputs.registry }} \
            -u ${{ github.actor }} \
            -p "${{ secrets.GITHUB_TOKEN }}" \
            --compat-auth-file $HOME/.docker/config.json

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Create and push multi-arch manifest
        id: create-manifest
        run: |
          IMAGE_BASE="${{ inputs.registry }}/${{ inputs.image_name }}"
          TAG="${{ inputs.tag }}"

          # Create manifest list
          podman manifest create ${IMAGE_BASE}:${TAG}

          # Add ARM64 digest (required)
          podman manifest add ${IMAGE_BASE}:${TAG} ${IMAGE_BASE}@${{ inputs.arm64_digest }}

          # Add AMD64 digest if provided
          if [ -n "${{ inputs.amd64_digest }}" ]; then
            podman manifest add ${IMAGE_BASE}:${TAG} ${IMAGE_BASE}@${{ inputs.amd64_digest }}
          fi

          # Push manifest
          podman manifest push ${IMAGE_BASE}:${TAG}

          # Get the manifest digest via skopeo
          DIGEST=$(skopeo inspect --raw docker://${IMAGE_BASE}:${TAG} | jq -r '.manifests[0].digest')

          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "✅ Multi-arch manifest created: ${IMAGE_BASE}:${TAG}@${DIGEST}"

      - name: Sign container image with cosign (key-based)
        if: inputs.signing_mode == 'key'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_DIGEST="${{ inputs.registry }}/${{ inputs.image_name }}@${{ steps.create-manifest.outputs.digest }}"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${IMAGE_DIGEST}"
          echo "✅ Signed (key-based): ${IMAGE_DIGEST}"

      - name: Sign container image with cosign (keyless)
        if: inputs.signing_mode == 'keyless'
        run: |
          IMAGE_DIGEST="${{ inputs.registry }}/${{ inputs.image_name }}@${{ steps.create-manifest.outputs.digest }}"
          cosign sign --yes "${IMAGE_DIGEST}"
          echo "✅ Signed (keyless): ${IMAGE_DIGEST}"
