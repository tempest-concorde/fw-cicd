name: Build Container (Reusable)

on:
  workflow_call:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io)'
        required: true
        type: string
      image_name:
        description: 'Image name without registry (e.g., tempest-concorde/fw-app)'
        required: true
        type: string
      platform:
        description: 'Platform to build for (e.g., linux/amd64, linux/arm64)'
        required: false
        type: string
        default: 'linux/arm64'
      containerfile:
        description: 'Path to Containerfile (default: Containerfile)'
        required: false
        type: string
        default: 'Containerfile'
      push:
        description: 'Push image to registry (default: true for main/tags)'
        required: false
        type: boolean
        default: true
      tags:
        description: 'Space-separated image tags'
        required: false
        type: string
        default: ''
    outputs:
      digest:
        description: 'Image digest'
        value: ${{ jobs.build.outputs.digest }}
    secrets:
      GITHUB_TOKEN:
        required: true

jobs:
  build:
    runs-on: ${{ contains(inputs.platform, 'arm64') && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write  # For cosign keyless signing

    outputs:
      digest: ${{ steps.digest.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Compute tags
        id: tags
        run: |
          if [ -n "${{ inputs.tags }}" ]; then
            echo "tags=${{ inputs.tags }}" >> $GITHUB_OUTPUT
          else
            # Default tags: branch name, sha, latest (if default branch)
            TAGS="test ${{ github.sha }}"
            if [ "${{ github.ref }}" = "refs/heads/${{ github.event.repository.default_branch }}" ]; then
              TAGS="$TAGS latest"
            fi
            echo "tags=$TAGS" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056  # v2.13
        with:
          image: ${{ inputs.image_name }}
          tags: ${{ steps.tags.outputs.tags }}
          platforms: ${{ inputs.platform }}
          containerfiles: |
            ./${{ inputs.containerfile }}

      - name: Log in to registry
        if: inputs.push
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603  # v1.7
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ inputs.registry }}

      - name: Push to registry
        if: inputs.push
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c  # v2.8
        with:
          image: ${{ inputs.image_name }}
          tags: ${{ steps.tags.outputs.tags }}
          registry: ${{ inputs.registry }}

      - name: Get digest
        if: inputs.push
        id: digest
        run: |
          # Use the first tag to get the digest
          FIRST_TAG=$(echo "${{ steps.tags.outputs.tags }}" | awk '{print $1}')
          DIGEST=$(podman image inspect --format '{{ .Digest }}' ${{ inputs.registry }}/${{ inputs.image_name }}:${FIRST_TAG} 2>/dev/null || \
                   skopeo inspect docker://${{ inputs.registry }}/${{ inputs.image_name }}:${FIRST_TAG} | jq -r '.Digest')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "Image digest: $DIGEST"

      - name: Run Trivy vulnerability scanner
        if: inputs.push
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image_name }}@${{ steps.digest.outputs.digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: inputs.push && always()
        uses: github/codeql-action/upload-sarif@48a2423ec5fbc4c86fb41a0244f87ea32cd56571  # codeql-bundle-v3.28.0
        with:
          sarif_file: 'trivy-results.sarif'
